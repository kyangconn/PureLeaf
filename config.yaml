# goleaf 配置文件
# 所有配置项均可通过环境变量覆盖，格式: GOLEAF_SECTION_KEY (例如 GOLEAF_SERVER_PORT)

server:
  port: 8080          # 服务监听端口
  mode: debug         # 运行模式: debug | release | test

database:
  path: ./data/goleaf.db   # SQLite 数据库文件路径

jwt:
  secret: change-me-in-production   # JWT 签名密钥 (生产环境请务必修改)
  expire_hour: 24                   # JWT 过期时间 (小时)

latex:
  compiler: pdflatex                # LaTeX 编译器: pdflatex | xelatex | lualatex
  timeout: 60                       # 编译超时时间 (秒)
