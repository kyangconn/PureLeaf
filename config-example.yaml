server:
  port: 8080          # 服务监听端口
  mode: debug         # 运行模式: debug | release | test
  log_file: ""        # 日志文件路径 (空=仅控制台，文件时自动轮转)
  trusted_proxies:    # 允许访问 setup 的 IP 列表 (支持 CIDR)
    - 127.0.0.1
    - ::1

database:
  path: ./data/goleaf.db

jwt:
  secret: change-me-in-production
  expire_hour: 24

latex:
  compiler: pdflatex
  timeout: 60
